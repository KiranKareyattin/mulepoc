#PR Quality Gates workflow for running various checks on pull requests
#all jobs are configured as required to ensure that the PR meets the quality standards before merging

name: PR Quality Gates

on:
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: "17"
  MAVEN_OPTIONS: "-Xmx1g -XX:+UseG1GC"

jobs:
  validate-branch-name:
    name: Validate Branch Name
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: check branch name format
        env:
          BRANCH_NAME: ${{ github.head_ref }}
          JIRA_KEY_PATTERN: 'APIPOD'
        run: |
          PATTERN="^(feature|hotfix)\/${{ env.JIRA_KEY_PATTERN }}-[A-Z0-9]+-[a-z0-9-]+$"
          if [[ ! "${{ env.BRANCH_NAME }}" =~ $PATTERN ]]; then
            echo "Branch name '${{ env.BRANCH_NAME }}' does not match the required pattern: ${PATTERN}"
            exit 1
          else
            echo "Branch name '${{ env.BRANCH_NAME }}' is valid."
          fi
  munit-coverage:
    name: MUnit Test Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run MUnit tests and generate coverage report
        run: mvn test jacoco:report -B -ntp

      - name: Upload MUnit coverage report
        uses: actions/upload-artifact@v4
        with:
          name: munit-coverage-report

  docker-integration-test:
    name: Docker Integration Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
      
      - name: Build snapshot Jar
        run: mvn package -DskipTests -B -ntp

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: |
          docker build -t my-app:latest .
      
      - name: Start Docker compose services
        run: |
          docker compose -f docker-compose.integration.yml up -d
      
      - name: wait for Mule app to be healthy
        run: |
          until [ "$(docker inspect -f '{{.State.Health.Status}}' mule-app-integration-test)" == "healthy" ]; do
            echo "Waiting for Mule app to be healthy..."
            sleep 5
          done
      
      - name: Run Maven Failsafe integration tests
        id: run-failsafe-tests
        run: mvn failsafe:integration-test failsafe:verify -B -ntp -Ddb.port=5432 
      
      - name: Prepare Logs and Reports
        if: always()
        run: |
          mkdir -p target/integration-results/logs
          docker compose -f docker-compose.integration.yml logs > target/integration-results/logs/docker-compose.log || true
          if [ -d "target/failsafe-reports" ]; then
            mkdir -p target/integration-results/reports
            cp target/failsafe-reports/*.xml target/integration-results/reports/ || true
          fi
      - name: Tear down Docker compose services
        if: always()
        run: |
          docker compose -f docker-compose.integration.yml down --volumes
      
      - name: Upload Logs and Reports
        if: always() 
        uses: actions/upload-artifact@v4 
        with:
          name: integration-test-results
          path: target/integration-results
          retention-days: 7
          if-no-files-found: ignore
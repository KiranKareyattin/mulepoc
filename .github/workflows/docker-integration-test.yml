name: PR Quality Check - Docker Integration Test

on:
  push:
    branches:
      - main
      - test

env:
  JAVA_VERSION: "17"
  MAVEN_OPTIONS: "-Xmx1g -XX:+UseG1GC"

jobs:
  docker-integration-test:
    name: Docker Integration Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      # Optional but safe
      - name: Clean Maven cache
        run: rm -rf ~/.m2/repository

      # ✅ Build Mule JAR
      - name: Build snapshot Jar
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -v ${{ github.workspace }}/.m2:/root/.m2 \
            -w /app \
            maven:3.9.6-eclipse-temurin-17 \
            mvn clean package -DskipTests

      - name: Start Docker compose services
        run: |
          docker compose -f docker-compose.integration.yml up -d

      # ✅ IMPORTANT: Wait until Mule app is healthy
      - name: Wait for Mule App to be healthy
        run: |
          echo "Waiting for Mule app to start..."
          for i in {1..30}; do
            STATUS=$(docker inspect -f '{{.State.Health.Status}}' mule-app-integration-test || echo "starting")
            echo "Current status: $STATUS"
            if [ "$STATUS" == "healthy" ]; then
              echo "Mule app is healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "Mule app failed to become healthy"
          docker logs mule-app-integration-test
          exit 1

      # ✅ Run integration tests
      - name: Run Maven Failsafe integration tests
        run: mvn failsafe:integration-test failsafe:verify -B -ntp

      # ✅ Collect logs
      - name: Prepare Logs and Reports
        if: always()
        run: |
          mkdir -p target/integration-results/logs
          docker compose -f docker-compose.integration.yml logs > target/integration-results/logs/docker-compose.log || true

          if [ -d "target/failsafe-reports" ]; then
            mkdir -p target/integration-results/reports
            cp target/failsafe-reports/*.xml target/integration-results/reports/ || true
          fi

      # ✅ Cleanup
      - name: Tear down Docker compose services
        if: always()
        run: |
          docker compose -f docker-compose.integration.yml down --volumes

      - name: Upload Logs and Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: target/integration-results
          retention-days: 7
          if-no-files-found: ignore
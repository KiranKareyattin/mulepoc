name: PR Quality Check - Integration Test

on:
  workflow_dispatch:

env:
  JAVA_VERSION: "17"

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Clean Maven cache
        run: rm -rf ~/.m2/repository

      # ✅ Build Mule app
      - name: Build Mule App
        run: mvn clean package -DskipTests

      # ✅ Start WireMock
      - name: Start WireMock
        run: docker compose -f docker-compose.integration.yml up -d

      # ✅ Wait for WireMock
      - name: Wait for WireMock
        run: |
          echo "Waiting for WireMock..."
          for i in {1..10}; do
            if curl -f http://localhost:8181/__admin/health; then
              echo "WireMock is ready!"
              exit 0
            fi
            sleep 5
          done
          echo "WireMock failed to start"
          docker logs $(docker ps -q)
          exit 1

      # ✅ Run Mule app in background
      - name: Start Mule App
        run: |
          mvn mule:run > /tmp/mule.log 2>&1 &
          MULE_PID=$!
          echo "MULE_PID=$MULE_PID" >> $GITHUB_ENV
          sleep 30

      # ✅ Wait for Mule App
      - name: Wait for Mule App
        run: |
          echo "Waiting for Mule App..."
          for i in {1..30}; do
            if curl -s http://localhost:8081/ > /dev/null 2>&1; then
              echo "Mule App is ready!"
              exit 0
            fi
            echo "Attempt $i: Mule not ready yet, waiting..."
            sleep 2
          done
          echo "Mule App failed to start"
          cat /tmp/mule.log || true
          exit 1

      # ✅ Run integration tests
      - name: Run Integration Tests
        run: mvn failsafe:integration-test failsafe:verify

      # ✅ Collect logs
      - name: Collect Logs
        if: always()
        run: |
          mkdir -p target/integration-results/logs
          docker compose -f docker-compose.integration.yml logs > target/integration-results/logs/docker.log || true
          cat /tmp/mule.log >> target/integration-results/logs/mule.log || true

      # ✅ Stop Mule App
      - name: Stop Mule App
        if: always()
        run: |
          if [ ! -z "$MULE_PID" ]; then
            kill $MULE_PID 2>/dev/null || true
            wait $MULE_PID 2>/dev/null || true
          fi

      # ✅ Stop services
      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.integration.yml down --volumes

      # ✅ Upload reports
      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: target
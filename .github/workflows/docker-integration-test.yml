name: PR Quality Check - Integration Test

on:
  push:
    branches:
      - main
      - test

env:
  JAVA_VERSION: "17"

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Clean Maven cache
        run: rm -rf ~/.m2/repository

      # ✅ Build Mule app
      - name: Build Mule App
        run: mvn clean package -DskipTests

      # ✅ Start WireMock
      - name: Start WireMock
        run: docker compose -f docker-compose.integration.yml up -d

      # ✅ Wait for WireMock
      - name: Wait for WireMock
        run: |
          echo "Waiting for WireMock..."
          for i in {1..10}; do
            if curl -f http://localhost:8181/__admin/health; then
              echo "WireMock is ready!"
              exit 0
            fi
            sleep 5
          done
          echo "WireMock failed to start"
          docker logs $(docker ps -q)
          exit 1

      # ✅ Run Mule app in background
      - name: Start Mule App
        run: |
          mvn mule:run &
          sleep 60

      # ✅ Run integration tests
      - name: Run Integration Tests
        run: mvn failsafe:integration-test failsafe:verify

      # ✅ Collect logs
      - name: Collect Logs
        if: always()
        run: |
          mkdir -p target/integration-results/logs
          docker compose -f docker-compose.integration.yml logs > target/integration-results/logs/docker.log || true

      # ✅ Stop services
      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.integration.yml down --volumes

      # ✅ Upload reports
      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: target
services:
  wiremock:
    image: wiremock/wiremock:latest
    ports:
      - "8181:8080"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro
    command:
      - "--verbose"
      - "--global-response-templating"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/__admin/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s